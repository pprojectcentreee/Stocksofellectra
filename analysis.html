<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Analysis - Ellectra Stock Management</title>
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Rajdhani:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<style>
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
}

:root {
    --bg: #0a0a0a;
    --bg2: #1a1a1a;
    --card: #151515;
    --border: #FFD700;
    --yellow: #FFD700;
    --orange: #FFA500;
    --text: #fff;
    --text-dim: #aaa;
    --success: #00ff88;
    --danger: #ff3366;
    --blue: #00bfff;
}

body {
    font-family: 'Rajdhani', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
}

.header {
    background: var(--bg2);
    border-bottom: 2px solid var(--yellow);
    padding: 15px 30px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    position: sticky;
    top: 0;
    z-index: 100;
}

.brand {
    display: flex;
    align-items: center;
    gap: 15px;
}

.brand img {
    width: 40px;
    height: 40px;
}

.brand-text h1 {
    font-family: 'Orbitron', sans-serif;
    font-size: 1.5rem;
    color: var(--yellow);
}

.brand-text p {
    font-size: 0.85rem;
    color: var(--orange);
}

.back-btn {
    background: transparent;
    border: 2px solid var(--yellow);
    color: var(--yellow);
    padding: 8px 20px;
    border-radius: 8px;
    font-family: 'Rajdhani', sans-serif;
    font-weight: 600;
    cursor: pointer;
    transition: all 0.3s;
}

.back-btn:hover {
    background: var(--yellow);
    color: #000;
}

.container {
    max-width: 1400px;
    margin: 0 auto;
    padding: 30px 20px;
}

.page-title {
    font-family: 'Orbitron', sans-serif;
    font-size: 2.5rem;
    color: var(--yellow);
    margin-bottom: 30px;
    text-align: center;
}

.stats-overview {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
    gap: 20px;
    margin-bottom: 30px;
}

.stat-card {
    background: var(--card);
    border: 2px solid var(--yellow);
    border-radius: 15px;
    padding: 25px;
    text-align: center;
}

.stat-icon {
    width: 60px;
    height: 60px;
    background: rgba(255, 215, 0, 0.1);
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 1.8rem;
    margin: 0 auto 15px;
}

.stat-value {
    font-family: 'Orbitron', sans-serif;
    font-size: 2.2rem;
    font-weight: 700;
    color: var(--yellow);
    margin-bottom: 5px;
}

.stat-label {
    color: var(--text-dim);
    font-size: 0.9rem;
}

.charts-grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(400px, 1fr));
    gap: 25px;
    margin-bottom: 30px;
}

.chart-card {
    background: var(--card);
    border: 2px solid var(--yellow);
    border-radius: 15px;
    padding: 25px;
}

.chart-title {
    font-family: 'Orbitron', sans-serif;
    font-size: 1.2rem;
    color: var(--yellow);
    margin-bottom: 20px;
}

.leaderboard {
    background: var(--card);
    border: 2px solid var(--yellow);
    border-radius: 15px;
    padding: 25px;
    margin-bottom: 30px;
}

.leaderboard-title {
    font-family: 'Orbitron', sans-serif;
    font-size: 1.5rem;
    color: var(--yellow);
    margin-bottom: 20px;
    text-align: center;
}

.leader-item {
    display: flex;
    align-items: center;
    justify-content: space-between;
    background: var(--bg2);
    padding: 15px 20px;
    border-radius: 10px;
    margin-bottom: 10px;
    border-left: 4px solid var(--yellow);
}

.leader-rank {
    font-family: 'Orbitron', sans-serif;
    font-size: 1.5rem;
    font-weight: 700;
    color: var(--yellow);
    width: 50px;
}

.leader-info {
    flex: 1;
    display: flex;
    align-items: center;
    gap: 15px;
}

.leader-avatar {
    width: 50px;
    height: 50px;
    border-radius: 50%;
    border: 3px solid var(--yellow);
    object-fit: cover;
}

.leader-name {
    font-weight: 700;
    font-size: 1.1rem;
}

.leader-stats {
    text-align: right;
}

.leader-value {
    font-family: 'Orbitron', sans-serif;
    font-size: 1.3rem;
    font-weight: 700;
    color: var(--success);
}

.leader-label {
    font-size: 0.85rem;
    color: var(--text-dim);
}

.export-section {
    background: var(--card);
    border: 2px solid var(--yellow);
    border-radius: 15px;
    padding: 25px;
    text-align: center;
}

.export-btn {
    background: var(--yellow);
    border: none;
    color: #000;
    padding: 15px 30px;
    border-radius: 8px;
    font-family: 'Rajdhani', sans-serif;
    font-weight: 700;
    font-size: 1.1rem;
    cursor: pointer;
    transition: all 0.3s;
    display: inline-flex;
    align-items: center;
    gap: 10px;
    margin: 10px;
}

.export-btn:hover {
    background: var(--orange);
    transform: translateY(-2px);
    box-shadow: 0 5px 15px rgba(255, 215, 0, 0.3);
}

@media (max-width: 768px) {
    .charts-grid {
        grid-template-columns: 1fr;
    }
    
    .leader-item {
        flex-direction: column;
        text-align: center;
    }
    
    .leader-stats {
        text-align: center;
    }
}
</style>
</head>
<body>

<div class="header">
    <div class="brand">
        <img src="https://raw.githubusercontent.com/pprojectcentreee/Ellectra/main/Ellectra_w01wap%20(2).png" alt="Logo">
        <div class="brand-text">
            <h1>ELLECTRA</h1>
            <p>Analytics Dashboard</p>
        </div>
    </div>
    
    <button class="back-btn" onclick="window.location.href='index.html'">
        <i class="fas fa-arrow-left"></i> BACK
    </button>
</div>

<div class="container">
    <h1 class="page-title">📊 SALES ANALYTICS</h1>
    
    <div class="stats-overview">
        <div class="stat-card">
            <div class="stat-icon" style="color: var(--yellow);">
                <i class="fas fa-box"></i>
            </div>
            <div class="stat-value" id="total-inventory">0</div>
            <div class="stat-label">Total Inventory</div>
        </div>
        
        <div class="stat-card">
            <div class="stat-icon" style="color: var(--success);">
                <i class="fas fa-chart-line"></i>
            </div>
            <div class="stat-value" id="total-sold">0</div>
            <div class="stat-label">Total Sold</div>
        </div>
        
        <div class="stat-card">
            <div class="stat-icon" style="color: var(--blue);">
                <i class="fas fa-rupee-sign"></i>
            </div>
            <div class="stat-value" id="total-revenue">₹0</div>
            <div class="stat-label">Total Revenue</div>
        </div>
        
        <div class="stat-card">
            <div class="stat-icon" style="color: var(--orange);">
                <i class="fas fa-users"></i>
            </div>
            <div class="stat-value">3</div>
            <div class="stat-label">Active Sellers</div>
        </div>
    </div>
    
    <div class="charts-grid">
        <div class="chart-card">
            <h3 class="chart-title">Sales by Person</h3>
            <canvas id="salesByPersonChart"></canvas>
        </div>
        
        <div class="chart-card">
            <h3 class="chart-title">Revenue Breakdown</h3>
            <canvas id="revenueChart"></canvas>
        </div>
        
        <div class="chart-card" style="grid-column: 1 / -1;">
            <h3 class="chart-title">Stock Distribution</h3>
            <canvas id="stockChart"></canvas>
        </div>
    </div>
    
    <div class="leaderboard">
        <h2 class="leaderboard-title">🏆 SALES LEADERBOARD</h2>
        <div id="leaderboard-list">
            <!-- Leaderboard will be populated here -->
        </div>
    </div>
    
    <div class="export-section">
        <h3 style="color: var(--yellow); margin-bottom: 20px; font-family: 'Orbitron', sans-serif;">
            EXPORT REPORTS
        </h3>
        <button class="export-btn" onclick="exportAllStocks()">
            <i class="fas fa-file-csv"></i>
            EXPORT ALL STOCKS
        </button>
        <button class="export-btn" onclick="exportAllSales()">
            <i class="fas fa-download"></i>
            EXPORT ALL SALES
        </button>
        <button class="export-btn" onclick="exportAnalytics()">
            <i class="fas fa-chart-bar"></i>
            EXPORT ANALYTICS
        </button>
    </div>
</div>

<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"></script>
<script>
const firebaseConfig = {
    apiKey: "AIzaSyAJm0fEDPItyL6nBMWzWGQnSAjreDlCOpQ",
    authDomain: "ellectra-2b95d.firebaseapp.com",
    projectId: "ellectra-2b95d",
    storageBucket: "ellectra-2b95d.firebasestorage.app",
    messagingSenderId: "164410965069",
    appId: "1:164410965069:web:b86f8fd714f84c27e3f004"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.firestore();

const USERS = ['girish', 'iyappan', 'santha'];
const USER_IMAGES = {
    'girish': 'https://raw.githubusercontent.com/pprojectcentreee/Stocksofellectra/main/gk.jpg',
    'iyappan': 'https://raw.githubusercontent.com/pprojectcentreee/Stocksofellectra/main/iappan%20.png',
    'santha': 'https://raw.githubusercontent.com/pprojectcentreee/Stocksofellectra/main/santha.jpeg'
};

let allSales = [];
let allProducts = [];
let userStocks = {};

// Load all data
async function loadAllData() {
    // Load products
    db.collection('components').onSnapshot(snapshot => {
        allProducts = [];
        snapshot.forEach(doc => {
            allProducts.push({ id: doc.id, ...doc.data() });
        });
        loadUserStocks();
    });
    
    // Load all sales
    db.collection('sales').onSnapshot(snapshot => {
        allSales = [];
        snapshot.forEach(doc => {
            allSales.push({ id: doc.id, ...doc.data() });
        });
        updateAnalytics();
    });
}

async function loadUserStocks() {
    for (const user of USERS) {
        const doc = await db.collection('userStocks').doc(user).get();
        if (doc.exists()) {
            userStocks[user] = doc.data();
        }
    }
    updateAnalytics();
}

function updateAnalytics() {
    // Calculate totals
    const salesByUser = {};
    const revenueByUser = {};
    
    USERS.forEach(user => {
        salesByUser[user] = allSales.filter(s => s.seller === user).length;
        revenueByUser[user] = allSales
            .filter(s => s.seller === user)
            .reduce((sum, s) => sum + (s.totalAmount || 0), 0);
    });
    
    const totalSold = Object.values(salesByUser).reduce((a, b) => a + b, 0);
    const totalRevenue = Object.values(revenueByUser).reduce((a, b) => a + b, 0);
    
    let totalInventory = 0;
    USERS.forEach(user => {
        if (userStocks[user]) {
            Object.values(userStocks[user]).forEach(item => {
                totalInventory += item.stock || 0;
            });
        }
    });
    
    // Update stats
    document.getElementById('total-inventory').textContent = totalInventory;
    document.getElementById('total-sold').textContent = totalSold;
    document.getElementById('total-revenue').textContent = '₹' + totalRevenue.toFixed(0);
    
    // Update charts
    updateCharts(salesByUser, revenueByUser);
    updateLeaderboard(salesByUser, revenueByUser);
}

function updateCharts(salesByUser, revenueByUser) {
    // Sales by Person Chart
    const ctx1 = document.getElementById('salesByPersonChart').getContext('2d');
    new Chart(ctx1, {
        type: 'bar',
        data: {
            labels: ['Girish', 'Iyappan', 'Santha'],
            datasets: [{
                label: 'Sales Count',
                data: [salesByUser.girish || 0, salesByUser.iyappan || 0, salesByUser.santha || 0],
                backgroundColor: ['#FFD700', '#FFA500', '#00ff88'],
                borderColor: ['#FFD700', '#FFA500', '#00ff88'],
                borderWidth: 2
            }]
        },
        options: {
            responsive: true,
            plugins: {
                legend: { 
                    labels: { color: '#FFD700' } 
                }
            },
            scales: {
                y: { 
                    beginAtZero: true,
                    ticks: { color: '#FFD700' },
                    grid: { color: 'rgba(255, 215, 0, 0.1)' }
                },
                x: { 
                    ticks: { color: '#FFD700' },
                    grid: { color: 'rgba(255, 215, 0, 0.1)' }
                }
            }
        }
    });
    
    // Revenue Chart
    const ctx2 = document.getElementById('revenueChart').getContext('2d');
    new Chart(ctx2, {
        type: 'doughnut',
        data: {
            labels: ['Girish', 'Iyappan', 'Santha'],
            datasets: [{
                data: [revenueByUser.girish || 0, revenueByUser.iyappan || 0, revenueByUser.santha || 0],
                backgroundColor: ['#FFD700', '#FFA500', '#00ff88'],
                borderColor: '#0a0a0a',
                borderWidth: 3
            }]
        },
        options: {
            responsive: true,
            plugins: {
                legend: { 
                    labels: { color: '#FFD700' } 
                }
            }
        }
    });
    
    // Stock Distribution Chart
    const stockData = {};
    USERS.forEach(user => {
        stockData[user] = 0;
        if (userStocks[user]) {
            Object.values(userStocks[user]).forEach(item => {
                stockData[user] += item.stock || 0;
            });
        }
    });
    
    const ctx3 = document.getElementById('stockChart').getContext('2d');
    new Chart(ctx3, {
        type: 'bar',
        data: {
            labels: ['Girish', 'Iyappan', 'Santha'],
            datasets: [{
                label: 'Current Stock',
                data: [stockData.girish || 0, stockData.iyappan || 0, stockData.santha || 0],
                backgroundColor: ['rgba(255, 215, 0, 0.3)', 'rgba(255, 165, 0, 0.3)', 'rgba(0, 255, 136, 0.3)'],
                borderColor: ['#FFD700', '#FFA500', '#00ff88'],
                borderWidth: 2
            }]
        },
        options: {
            responsive: true,
            indexAxis: 'y',
            plugins: {
                legend: { 
                    labels: { color: '#FFD700' } 
                }
            },
            scales: {
                x: { 
                    beginAtZero: true,
                    ticks: { color: '#FFD700' },
                    grid: { color: 'rgba(255, 215, 0, 0.1)' }
                },
                y: { 
                    ticks: { color: '#FFD700' },
                    grid: { color: 'rgba(255, 215, 0, 0.1)' }
                }
            }
        }
    });
}

function updateLeaderboard(salesByUser, revenueByUser) {
    const leaderboard = USERS.map(user => ({
        name: user.charAt(0).toUpperCase() + user.slice(1),
        user: user,
        sales: salesByUser[user] || 0,
        revenue: revenueByUser[user] || 0
    })).sort((a, b) => b.revenue - a.revenue);
    
    const list = document.getElementById('leaderboard-list');
    list.innerHTML = leaderboard.map((leader, index) => `
        <div class="leader-item">
            <div class="leader-rank">#${index + 1}</div>
            <div class="leader-info">
                <img src="${USER_IMAGES[leader.user]}" class="leader-avatar" alt="${leader.name}">
                <div>
                    <div class="leader-name">${leader.name}</div>
                    <div style="color: var(--text-dim); font-size: 0.9rem;">${leader.sales} sales</div>
                </div>
            </div>
            <div class="leader-stats">
                <div class="leader-value">₹${leader.revenue.toFixed(0)}</div>
                <div class="leader-label">Revenue</div>
            </div>
        </div>
    `).join('');
}

function exportAllStocks() {
    let csv = '\uFEFFUser,Product,Available Stock,Total Sold\n';
    
    USERS.forEach(user => {
        if (userStocks[user]) {
            Object.keys(userStocks[user]).forEach(productId => {
                const product = allProducts.find(p => p.id === productId);
                const data = userStocks[user][productId];
                csv += `"${user}","${product?.name || productId}",${data.stock || 0},${data.sold || 0}\n`;
            });
        }
    });
    
    downloadCSV(csv, `all_stocks_${new Date().toISOString().slice(0, 10)}.csv`);
}

function exportAllSales() {
    let csv = '\uFEFFDate,Seller,Product,Quantity,Price,Total Amount\n';
    
    allSales.forEach(s => {
        const date = s.timestamp ? s.timestamp.toDate().toLocaleString('en-IN') : 'N/A';
        csv += `"${date}","${s.seller}","${s.productName}",${s.quantity},₹${s.price},₹${s.totalAmount}\n`;
    });
    
    downloadCSV(csv, `all_sales_${new Date().toISOString().slice(0, 10)}.csv`);
}

function exportAnalytics() {
    let csv = '\uFEFFEllectra Stock Management - Analytics Report\n';
    csv += `Generated: ${new Date().toLocaleString('en-IN')}\n\n`;
    
    csv += 'User,Total Sales,Total Revenue\n';
    USERS.forEach(user => {
        const sales = allSales.filter(s => s.seller === user).length;
        const revenue = allSales.filter(s => s.seller === user).reduce((sum, s) => sum + (s.totalAmount || 0), 0);
        csv += `"${user}",${sales},₹${revenue.toFixed(2)}\n`;
    });
    
    downloadCSV(csv, `analytics_report_${new Date().toISOString().slice(0, 10)}.csv`);
}

function downloadCSV(csv, filename) {
    const blob = new Blob([csv], { type: 'text/csv;charset=utf-8;' });
    const url = URL.createObjectURL(blob);
    const link = document.createElement('a');
    link.href = url;
    link.download = filename;
    link.click();
    URL.revokeObjectURL(url);
}

// Initialize
loadAllData();
</script>
</body>
</html>
