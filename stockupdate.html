<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Stock Update - Ellectra</title>
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Rajdhani:wght@300;400;500;600;700&family=Share+Tech+Mono&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
<style>
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
}

:root {
    --bg: #0a0a0a;
    --bg2: #1a1a1a;
    --card: #151515;
    --border: #FFD700;
    --yellow: #FFD700;
    --orange: #FFA500;
    --text: #fff;
    --text-dim: #aaa;
    --success: #00ff88;
    --danger: #ff3366;
    --blue: #00bfff;
}

body {
    font-family: 'Rajdhani', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
}

.header {
    background: var(--bg2);
    border-bottom: 2px solid var(--yellow);
    padding: 15px 30px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    position: sticky;
    top: 0;
    z-index: 100;
}

.brand {
    display: flex;
    align-items: center;
    gap: 15px;
}

.brand img {
    width: 40px;
    height: 40px;
}

.brand-text h1 {
    font-family: 'Orbitron', sans-serif;
    font-size: 1.5rem;
    color: var(--yellow);
}

.brand-text p {
    font-size: 0.85rem;
    color: var(--orange);
}

.back-btn {
    background: transparent;
    border: 2px solid var(--yellow);
    color: var(--yellow);
    padding: 8px 20px;
    border-radius: 8px;
    font-family: 'Rajdhani', sans-serif;
    font-weight: 600;
    cursor: pointer;
    transition: all 0.3s;
}

.back-btn:hover {
    background: var(--yellow);
    color: #000;
}

.container {
    max-width: 1400px;
    margin: 0 auto;
    padding: 30px 20px;
}

.page-title {
    font-family: 'Orbitron', sans-serif;
    font-size: 2.5rem;
    color: var(--yellow);
    margin-bottom: 10px;
    text-align: center;
}

.page-subtitle {
    text-align: center;
    color: var(--text-dim);
    margin-bottom: 30px;
}

.stock-overview {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
    gap: 20px;
    margin-bottom: 30px;
}

.overview-card {
    background: var(--card);
    border: 2px solid var(--yellow);
    border-radius: 15px;
    padding: 20px;
    text-align: center;
}

.overview-label {
    color: var(--text-dim);
    font-size: 0.9rem;
    margin-bottom: 10px;
}

.overview-value {
    font-family: 'Orbitron', sans-serif;
    font-size: 1.8rem;
    font-weight: 700;
    color: var(--yellow);
}

.search-filter-bar {
    display: flex;
    gap: 15px;
    margin-bottom: 25px;
    flex-wrap: wrap;
}

.search-box {
    flex: 1;
    min-width: 250px;
    padding: 12px 20px;
    background: var(--bg2);
    border: 2px solid var(--yellow);
    color: var(--text);
    border-radius: 8px;
    font-family: 'Rajdhani', sans-serif;
    font-size: 1rem;
}

.search-box:focus {
    outline: none;
    box-shadow: 0 0 15px rgba(255, 215, 0, 0.3);
}

.filter-select {
    padding: 12px 20px;
    background: var(--bg2);
    border: 2px solid var(--yellow);
    color: var(--text);
    border-radius: 8px;
    font-family: 'Rajdhani', sans-serif;
    font-size: 1rem;
    cursor: pointer;
}

.stock-table-container {
    background: var(--card);
    border: 2px solid var(--yellow);
    border-radius: 15px;
    padding: 25px;
    overflow-x: auto;
}

.stock-table {
    width: 100%;
    border-collapse: separate;
    border-spacing: 0 10px;
}

.stock-table th {
    text-align: left;
    padding: 12px;
    color: var(--yellow);
    font-family: 'Orbitron', sans-serif;
    font-size: 0.9rem;
    text-transform: uppercase;
    position: sticky;
    top: 0;
    background: var(--card);
}

.stock-table tr {
    background: var(--bg2);
    transition: all 0.3s;
}

.stock-table tr:hover {
    background: rgba(255, 215, 0, 0.05);
}

.stock-table td {
    padding: 15px 12px;
}

.stock-table tr td:first-child {
    border-radius: 10px 0 0 10px;
}

.stock-table tr td:last-child {
    border-radius: 0 10px 10px 0;
}

.product-img-small {
    width: 50px;
    height: 50px;
    object-fit: contain;
    background: var(--card);
    border-radius: 8px;
    padding: 5px;
    border: 2px solid var(--yellow);
}

.product-name-cell {
    font-weight: 700;
    color: var(--yellow);
}

.product-category-small {
    font-size: 0.8rem;
    color: var(--orange);
}

.stock-input {
    width: 80px;
    padding: 6px 10px;
    background: var(--card);
    border: 2px solid var(--yellow);
    color: var(--text);
    border-radius: 6px;
    text-align: center;
    font-family: 'Rajdhani', sans-serif;
    font-weight: 700;
}

.stock-input:focus {
    outline: none;
    box-shadow: 0 0 10px rgba(255, 215, 0, 0.3);
}

.update-btn {
    background: var(--success);
    border: none;
    color: #000;
    padding: 8px 15px;
    border-radius: 6px;
    font-family: 'Rajdhani', sans-serif;
    font-weight: 700;
    cursor: pointer;
    transition: all 0.3s;
}

.update-btn:hover {
    background: #00cc66;
    transform: scale(1.05);
}

.update-all-btn {
    background: var(--yellow);
    border: none;
    color: #000;
    padding: 12px 30px;
    border-radius: 8px;
    font-family: 'Rajdhani', sans-serif;
    font-weight: 700;
    font-size: 1.1rem;
    cursor: pointer;
    transition: all 0.3s;
    display: flex;
    align-items: center;
    gap: 10px;
    margin: 25px auto 0;
}

.update-all-btn:hover {
    background: var(--orange);
    transform: translateY(-2px);
    box-shadow: 0 5px 15px rgba(255, 215, 0, 0.3);
}

.stock-badge {
    padding: 4px 12px;
    border-radius: 20px;
    font-size: 0.85rem;
    font-weight: 700;
}

.badge-low {
    background: rgba(255, 51, 102, 0.2);
    color: var(--danger);
    border: 1px solid var(--danger);
}

.badge-medium {
    background: rgba(255, 165, 0, 0.2);
    color: var(--orange);
    border: 1px solid var(--orange);
}

.badge-high {
    background: rgba(0, 255, 136, 0.2);
    color: var(--success);
    border: 1px solid var(--success);
}

.toast {
    position: fixed;
    bottom: 30px;
    right: 30px;
    background: var(--card);
    border: 2px solid var(--yellow);
    border-radius: 10px;
    padding: 15px 25px;
    color: var(--text);
    font-weight: 600;
    display: none;
    align-items: center;
    gap: 10px;
    animation: slideIn 0.3s ease;
    z-index: 1000;
}

.toast.show {
    display: flex;
}

.toast.success {
    border-color: var(--success);
}

.toast.error {
    border-color: var(--danger);
}

@keyframes slideIn {
    from {
        transform: translateX(400px);
        opacity: 0;
    }
    to {
        transform: translateX(0);
        opacity: 1;
    }
}

.user-tabs {
    display: flex;
    gap: 0;
    margin-bottom: 25px;
    background: var(--bg2);
    border-radius: 10px;
    padding: 5px;
    border: 2px solid var(--yellow);
}

.user-tab {
    flex: 1;
    padding: 12px 20px;
    background: transparent;
    border: none;
    color: var(--text-dim);
    font-family: 'Rajdhani', sans-serif;
    font-weight: 600;
    font-size: 1rem;
    cursor: pointer;
    border-radius: 8px;
    transition: all 0.3s;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 10px;
}

.user-tab:hover {
    color: var(--yellow);
}

.user-tab.active {
    background: var(--yellow);
    color: #000;
}

.user-avatar-small {
    width: 30px;
    height: 30px;
    border-radius: 50%;
    border: 2px solid currentColor;
    object-fit: cover;
}

.bulk-actions {
    background: var(--card);
    border: 2px solid var(--yellow);
    border-radius: 15px;
    padding: 20px;
    margin-bottom: 25px;
}

.bulk-actions-title {
    font-family: 'Orbitron', sans-serif;
    color: var(--yellow);
    margin-bottom: 15px;
}

.bulk-controls {
    display: flex;
    gap: 15px;
    flex-wrap: wrap;
    align-items: center;
}

.bulk-input {
    padding: 10px 15px;
    background: var(--bg2);
    border: 2px solid var(--yellow);
    color: var(--text);
    border-radius: 8px;
    font-family: 'Rajdhani', sans-serif;
    width: 150px;
}

.bulk-btn {
    padding: 10px 20px;
    background: var(--blue);
    border: none;
    color: #000;
    border-radius: 8px;
    font-family: 'Rajdhani', sans-serif;
    font-weight: 700;
    cursor: pointer;
    transition: all 0.3s;
}

.bulk-btn:hover {
    background: #0099cc;
    transform: translateY(-2px);
}

@media (max-width: 768px) {
    .user-tabs {
        flex-direction: column;
    }
    
    .stock-table {
        font-size: 0.85rem;
    }
    
    .stock-input {
        width: 60px;
    }
}
</style>
</head>
<body>

<div class="header">
    <div class="brand">
        <img src="https://raw.githubusercontent.com/pprojectcentreee/Ellectra/main/Ellectra_w01wap%20(2).png" alt="Logo">
        <div class="brand-text">
            <h1>ELLECTRA</h1>
            <p>Stock Distribution Center</p>
        </div>
    </div>
    
    <button class="back-btn" onclick="window.location.href='index.html'">
        <i class="fas fa-arrow-left"></i> BACK
    </button>
</div>

<div class="container">
    <h1 class="page-title">📦 STOCK UPDATE CENTER</h1>
    <p class="page-subtitle">Distribute inventory to sales executives</p>
    
    <div class="stock-overview">
        <div class="overview-card">
            <div class="overview-label">Total Products</div>
            <div class="overview-value" id="total-products">0</div>
        </div>
        <div class="overview-card">
            <div class="overview-label">Girish's Stock</div>
            <div class="overview-value" id="girish-total">0</div>
        </div>
        <div class="overview-card">
            <div class="overview-label">Iyappan's Stock</div>
            <div class="overview-value" id="iyappan-total">0</div>
        </div>
        <div class="overview-card">
            <div class="overview-label">Santha's Stock</div>
            <div class="overview-value" id="santha-total">0</div>
        </div>
    </div>
    
    <div class="user-tabs">
        <button class="user-tab active" onclick="switchUser('girish', this)">
            <img src="https://raw.githubusercontent.com/pprojectcentreee/Stocksofellectra/main/gk.jpg" class="user-avatar-small">
            GIRISH
        </button>
        <button class="user-tab" onclick="switchUser('iyappan', this)">
            <img src="https://raw.githubusercontent.com/pprojectcentreee/Stocksofellectra/main/iappan%20.png" class="user-avatar-small">
            IYAPPAN
        </button>
        <button class="user-tab" onclick="switchUser('santha', this)">
            <img src="https://raw.githubusercontent.com/pprojectcentreee/Stocksofellectra/main/santha.jpeg" class="user-avatar-small">
            SANTHA
        </button>
    </div>
    
    <div class="bulk-actions">
        <h3 class="bulk-actions-title">⚡ BULK ACTIONS</h3>
        <div class="bulk-controls">
            <input type="number" class="bulk-input" id="bulk-qty" placeholder="Quantity" min="0">
            <button class="bulk-btn" onclick="addBulkStock()">
                <i class="fas fa-plus"></i> ADD TO ALL
            </button>
            <button class="bulk-btn" onclick="setBulkStock()">
                <i class="fas fa-equals"></i> SET ALL
            </button>
            <button class="bulk-btn" style="background: var(--danger);" onclick="clearAllStock()">
                <i class="fas fa-trash"></i> CLEAR ALL
            </button>
        </div>
    </div>
    
    <div class="search-filter-bar">
        <input type="text" class="search-box" id="search-input" placeholder="Search products...">
        <select class="filter-select" id="category-filter">
            <option value="">All Categories</option>
        </select>
        <select class="filter-select" id="stock-filter">
            <option value="">All Stock Levels</option>
            <option value="low">Low Stock (< 5)</option>
            <option value="medium">Medium Stock (5-20)</option>
            <option value="high">High Stock (> 20)</option>
        </select>
    </div>
    
    <div class="stock-table-container">
        <table class="stock-table">
            <thead>
                <tr>
                    <th>Image</th>
                    <th>Product</th>
                    <th>Category</th>
                    <th>Price</th>
                    <th>Main Stock</th>
                    <th>Current Stock</th>
                    <th>Total Sold</th>
                    <th>New Stock</th>
                    <th>Action</th>
                </tr>
            </thead>
            <tbody id="stock-tbody">
                <!-- Stock rows will be loaded here -->
            </tbody>
        </table>
    </div>
    
    <button class="update-all-btn" onclick="updateAllStocks()">
        <i class="fas fa-sync-alt"></i>
        UPDATE ALL CHANGES
    </button>
</div>

<div class="toast" id="toast">
    <i class="fas fa-check-circle"></i>
    <span id="toast-message"></span>
</div>

<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"></script>
<script>
const firebaseConfig = {
    apiKey: "AIzaSyAJm0fEDPItyL6nBMWzWGQnSAjreDlCOpQ",
    authDomain: "ellectra-2b95d.firebaseapp.com",
    projectId: "ellectra-2b95d",
    storageBucket: "ellectra-2b95d.firebasestorage.app",
    messagingSenderId: "164410965069",
    appId: "1:164410965069:web:b86f8fd714f84c27e3f004"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.firestore();

let currentUser = 'girish';
let allProducts = [];
let userStocks = {
    girish: {},
    iyappan: {},
    santha: {}
};
let pendingUpdates = {};

// Load all products
db.collection('components').onSnapshot(snapshot => {
    allProducts = [];
    const categories = new Set();
    
    snapshot.forEach(doc => {
        const data = doc.data();
        allProducts.push({ id: doc.id, ...data });
        if (data.category) categories.add(data.category);
    });
    
    // Populate category filter
    const categoryFilter = document.getElementById('category-filter');
    categoryFilter.innerHTML = '<option value="">All Categories</option>';
    Array.from(categories).sort().forEach(cat => {
        categoryFilter.innerHTML += `<option value="${cat}">${cat}</option>`;
    });
    
    loadUserStocks();
});

// Load all user stocks
async function loadUserStocks() {
    for (const user of ['girish', 'iyappan', 'santha']) {
        const doc = await db.collection('userStocks').doc(user).get();
        if (doc.exists) {
            userStocks[user] = doc.data();
        }
    }
    renderStockTable();
    updateOverview();
}

function switchUser(user, btn) {
    currentUser = user;
    document.querySelectorAll('.user-tab').forEach(t => t.classList.remove('active'));
    btn.classList.add('active');
    renderStockTable();
}

function renderStockTable() {
    const tbody = document.getElementById('stock-tbody');
    const search = document.getElementById('search-input').value.toLowerCase();
    const categoryFilter = document.getElementById('category-filter').value;
    const stockFilter = document.getElementById('stock-filter').value;
    
    let filtered = allProducts.filter(p => {
        const matchSearch = p.name.toLowerCase().includes(search) || 
                          (p.category && p.category.toLowerCase().includes(search));
        const matchCategory = !categoryFilter || p.category === categoryFilter;
        
        const currentStock = userStocks[currentUser][p.id]?.stock || 0;
        let matchStockLevel = true;
        if (stockFilter === 'low') matchStockLevel = currentStock < 5;
        else if (stockFilter === 'medium') matchStockLevel = currentStock >= 5 && currentStock <= 20;
        else if (stockFilter === 'high') matchStockLevel = currentStock > 20;
        
        return matchSearch && matchCategory && matchStockLevel;
    });
    
    if (filtered.length === 0) {
        tbody.innerHTML = '<tr><td colspan="9" style="text-align: center; padding: 40px; color: var(--text-dim);">No products found</td></tr>';
        return;
    }
    
    tbody.innerHTML = filtered.map(p => {
        const currentStock = userStocks[currentUser][p.id]?.stock || 0;
        const totalSold = userStocks[currentUser][p.id]?.sold || 0;
        const mainStock = p.stock || 0;
        
        let stockBadge = 'badge-high';
        if (currentStock < 5) stockBadge = 'badge-low';
        else if (currentStock <= 20) stockBadge = 'badge-medium';
        
        return `
            <tr>
                <td>
                    <img src="${p.image || 'https://via.placeholder.com/50/1a1a1a/FFD700?text=?'}" 
                         class="product-img-small"
                         onerror="this.src='https://via.placeholder.com/50/1a1a1a/FFD700?text=?'">
                </td>
                <td>
                    <div class="product-name-cell">${p.name}</div>
                    <div class="product-category-small">${p.category || ''}</div>
                </td>
                <td>${p.category || '-'}</td>
                <td style="color: var(--success); font-weight: 700;">₹${parseFloat(p.price).toFixed(2)}</td>
                <td style="color: var(--blue); font-weight: 700;">${mainStock}</td>
                <td>
                    <span class="stock-badge ${stockBadge}">${currentStock}</span>
                </td>
                <td style="color: var(--orange); font-weight: 700;">${totalSold}</td>
                <td>
                    <input type="number" 
                           class="stock-input" 
                           id="input-${p.id}" 
                           value="${pendingUpdates[p.id] !== undefined ? pendingUpdates[p.id] : currentStock}"
                           min="0"
                           onchange="markPendingUpdate('${p.id}', this.value)">
                </td>
                <td>
                    <button class="update-btn" onclick="updateSingleStock('${p.id}')">
                        <i class="fas fa-save"></i> UPDATE
                    </button>
                </td>
            </tr>
        `;
    }).join('');
}

function markPendingUpdate(productId, newValue) {
    pendingUpdates[productId] = parseInt(newValue) || 0;
}

function updateSingleStock(productId) {
    const input = document.getElementById('input-' + productId);
    const newStock = parseInt(input.value) || 0;
    
    db.collection('userStocks').doc(currentUser).set({
        [productId]: {
            stock: newStock,
            sold: userStocks[currentUser][productId]?.sold || 0
        }
    }, { merge: true }).then(() => {
        delete pendingUpdates[productId];
        showToast('Stock updated for ' + allProducts.find(p => p.id === productId).name, 'success');
    }).catch(err => {
        showToast('Error: ' + err.message, 'error');
    });
}

function updateAllStocks() {
    if (Object.keys(pendingUpdates).length === 0) {
        showToast('No changes to update', 'error');
        return;
    }
    
    const updateData = {};
    Object.keys(pendingUpdates).forEach(productId => {
        updateData[productId] = {
            stock: pendingUpdates[productId],
            sold: userStocks[currentUser][productId]?.sold || 0
        };
    });
    
    db.collection('userStocks').doc(currentUser).set(updateData, { merge: true })
        .then(() => {
            showToast(`Updated ${Object.keys(pendingUpdates).length} products for ${currentUser}`, 'success');
            pendingUpdates = {};
        })
        .catch(err => {
            showToast('Error: ' + err.message, 'error');
        });
}

function addBulkStock() {
    const qty = parseInt(document.getElementById('bulk-qty').value);
    if (!qty || qty <= 0) {
        showToast('Enter valid quantity', 'error');
        return;
    }
    
    allProducts.forEach(p => {
        const currentStock = userStocks[currentUser][p.id]?.stock || 0;
        const newStock = currentStock + qty;
        pendingUpdates[p.id] = newStock;
        const input = document.getElementById('input-' + p.id);
        if (input) input.value = newStock;
    });
    
    showToast(`Added ${qty} to all products (pending update)`, 'success');
}

function setBulkStock() {
    const qty = parseInt(document.getElementById('bulk-qty').value);
    if (qty === undefined || qty < 0) {
        showToast('Enter valid quantity', 'error');
        return;
    }
    
    allProducts.forEach(p => {
        pendingUpdates[p.id] = qty;
        const input = document.getElementById('input-' + p.id);
        if (input) input.value = qty;
    });
    
    showToast(`Set all products to ${qty} (pending update)`, 'success');
}

function clearAllStock() {
    if (!confirm('Clear all stock for ' + currentUser.toUpperCase() + '?\n\nThis will set all stock to 0!')) {
        return;
    }
    
    allProducts.forEach(p => {
        pendingUpdates[p.id] = 0;
        const input = document.getElementById('input-' + p.id);
        if (input) input.value = 0;
    });
    
    showToast('All stock cleared (pending update)', 'success');
}

function updateOverview() {
    document.getElementById('total-products').textContent = allProducts.length;
    
    ['girish', 'iyappan', 'santha'].forEach(user => {
        let total = 0;
        Object.values(userStocks[user]).forEach(item => {
            total += item.stock || 0;
        });
        document.getElementById(user + '-total').textContent = total;
    });
}

function showToast(message, type = 'success') {
    const toast = document.getElementById('toast');
    const msg = document.getElementById('toast-message');
    
    msg.textContent = message;
    toast.className = 'toast show ' + type;
    
    setTimeout(() => {
        toast.classList.remove('show');
    }, 3000);
}

// Event listeners
document.getElementById('search-input').addEventListener('input', renderStockTable);
document.getElementById('category-filter').addEventListener('change', renderStockTable);
document.getElementById('stock-filter').addEventListener('change', renderStockTable);
</script>
</body>
</html>
